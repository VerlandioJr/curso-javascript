<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrever no navegador</title>
</head>
<body>
    
    <script>
        window.alert('Seja bem-vindo(a) ao nosso site!')
        var nome = window.prompt('Qual é o seu nome?')
        document.write(`Olá, ${nome}. Seja bem-vindo(a) ao nosso site! É uma satisfação lhe ter por aqui!`)
    </script>
</body>
</html>
